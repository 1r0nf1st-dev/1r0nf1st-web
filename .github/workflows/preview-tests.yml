name: Playwright E2E Tests

on:
  repository_dispatch:
    types:
      - 'vercel.deployment.ready'
      - 'vercel.deployment.success'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test (leave empty to run against local dev server)'
        required: false
        default: ''

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      checks: write
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.git.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Determine BASE_URL
        id: base_url
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            echo "url=${{ github.event.inputs.base_url }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.client_payload.url }}" ]; then
            URL="${{ github.event.client_payload.url }}"
            if [[ ! "$URL" =~ ^https?:// ]]; then
              URL="https://${URL}"
            fi
            echo "url=${URL}" >> "$GITHUB_OUTPUT"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ steps.base_url.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm test:e2e

      - name: Report status to Vercel
        if: github.event_name == 'repository_dispatch' && always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: 'playwright-e2e'
